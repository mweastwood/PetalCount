name: Deploy (Prod)

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_prod_firebase_web:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Verify Firebase Service Account Secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETAL_COUNT_PROD }}" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT_PETAL_COUNT_PROD is empty or not configured in GitHub Secrets!"
            exit 1
          fi

      - name: Parse Version from Git Tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          IFS='.' read -r -a parts <<< "$VERSION"
          major="${parts[0]:-0}"
          minor="${parts[1]:-0}"
          patch="${parts[2]:-0}"
          major=$(echo "$major" | grep -oE '^[0-9]+' || echo 0)
          minor=$(echo "$minor" | grep -oE '^[0-9]+' || echo 0)
          patch=$(echo "$patch" | grep -oE '^[0-9]+' || echo 0)
          VERSION_CODE=$((major * 1000000 + minor * 10000 + patch))
          VERSION_NAME="${major}.${minor}.${patch}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web App
        run: flutter build web --release --target lib/main_prod.dart --build-name=$VERSION_NAME --build-number=$VERSION_CODE

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          entryPoint: ./app
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETAL_COUNT_PROD }}'
          channelId: live
          projectId: petal-count-prod
          firebaseToolsVersion: '15.22.3'
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

  deploy_prod_firebase_android:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETAL_COUNT_PROD }}" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT_PETAL_COUNT_PROD is empty or not configured in GitHub Secrets!"
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 is empty or not configured in GitHub Secrets!"
            exit 1
          fi

      - name: Parse Version from Git Tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          IFS='.' read -r -a parts <<< "$VERSION"
          major="${parts[0]:-0}"
          minor="${parts[1]:-0}"
          patch="${parts[2]:-0}"
          major=$(echo "$major" | grep -oE '^[0-9]+' || echo 0)
          minor=$(echo "$minor" | grep -oE '^[0-9]+' || echo 0)
          patch=$(echo "$patch" | grep -oE '^[0-9]+' || echo 0)
          VERSION_CODE=$((major * 1000000 + minor * 10000 + patch))
          VERSION_NAME="${major}.${minor}.${patch}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build Android APK
        run: flutter build apk --release --flavor prod --target lib/main_prod.dart --build-name=$VERSION_NAME --build-number=$VERSION_CODE
        env:
          ANDROID_KEYSTORE_PATH: "release.keystore"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "1:847947122489:android:144d8867e4c14281ef0ae8"
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETAL_COUNT_PROD }}
          groups: testers
          file: app/build/app/outputs/flutter-apk/app-prod-release.apk

  deploy_prod_google_play:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Parse Version from Git Tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          IFS='.' read -r -a parts <<< "$VERSION"
          major="${parts[0]:-0}"
          minor="${parts[1]:-0}"
          patch="${parts[2]:-0}"
          major=$(echo "$major" | grep -oE '^[0-9]+' || echo 0)
          minor=$(echo "$minor" | grep -oE '^[0-9]+' || echo 0)
          patch=$(echo "$patch" | grep -oE '^[0-9]+' || echo 0)
          VERSION_CODE=$((major * 1000000 + minor * 10000 + patch))
          VERSION_NAME="${major}.${minor}.${patch}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build Android AppBundle
        run: flutter build appbundle --release --flavor prod --target lib/main_prod.dart --build-name=$VERSION_NAME --build-number=$VERSION_CODE
        env:
          ANDROID_KEYSTORE_PATH: "release.keystore"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETAL_COUNT_PROD }}
          packageName: "com.mweastwood.petal_count"
          releaseFiles: app/build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: internal
          status: completed
